{% load i18n %}
<header class="border-b border-line bg-surface">
    <nav class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
        <a href="{% url 'public:home' %}" class="font-semibold text-ink">
            {% translate "4 Vallées Ambassadors" %}
        </a>
        <div class="flex items-center gap-4 text-sm">
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:detail' %}" class="font-medium text-ink">
                    {% translate "My account" %}
                </a>
                <a href="{% url 'account_logout' %}" class="text-body">
                    {% translate "Log out" %}
                </a>
            {% else %}
                <a href="{% url 'account_login' %}" class="font-medium text-ink">
                    {% translate "Log in" %}
                </a>
            {% endif %}
            <form action="{% url 'set_language' %}" method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.path }}">
                <select
                    name="language"
                    onchange="this.form.submit()"
                    class="rounded-control border border-line bg-surface px-2 py-1"
                    aria-label="{% translate 'Change language' %}"
                >
                    {% get_current_language as current %}
                    {% get_available_languages as languages %}
                    {% for code, name in languages %}
                        <option value="{{ code }}" {% if code == current %}selected{% endif %}>
                            {{ name }}
                        </option>
                    {% endfor %}
                </select>
            </form>
        </div>
    </nav>
</header>
