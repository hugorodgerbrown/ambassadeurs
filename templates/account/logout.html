{% extends "base.html" %}
{% load i18n %}

{% block title %}{% translate "Log out" %}{% endblock %}

{% block content %}
    <section class="mx-auto max-w-md text-center">
        <h1 class="mb-4 text-3xl font-bold text-ink">
            {% translate "Log out" %}
        </h1>
        <p class="mb-6 text-body">
            {% translate "Are you sure you want to log out?" %}
        </p>
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn--primary">
                {% translate "Log out" %}
            </button>
        </form>
    </section>
{% endblock %}
