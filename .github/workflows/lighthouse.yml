# .github/workflows/lighthouse.yml — Run a Lighthouse audit (performance,
# accessibility, best-practices, SEO) against the key public pages, served by
# the Django dev server. Thresholds live in lighthouserc.json.

name: Lighthouse

on:
  push:
    branches:
      - main
    paths:
      - "**/*.py"
      - "templates/**"
      - "src/css/**"
      - "static/**"
      - "lighthouserc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lighthouse.yml"

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "templates/**"
      - "src/css/**"
      - "static/**"
      - "lighthouserc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lighthouse.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only reads the checked-out code.
permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Set up Node (24)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Python dependencies
        run: uv sync

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run css:build

      - name: Apply migrations
        run: uv run python manage.py migrate

      - name: Run Lighthouse CI
        run: npx lhci autorun
