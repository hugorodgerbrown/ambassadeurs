{% extends "base.html" %}
{% load i18n %}

{% block title %}{% translate "Register" %}{% endblock %}

{% block topband %}
    <div
        id="topband"
        class="role-theme{% if role_value != 'AMBASSADOR' %} role-theme--referee{% endif %}"
    >
        <div class="role-band"></div>
    </div>
{% endblock %}

{% block content %}
    <section class="mx-auto max-w-narrow">
        {% include "public/partials/register_surface.html" with form=form role=role role_value=role_value %}
    </section>
{% endblock %}
