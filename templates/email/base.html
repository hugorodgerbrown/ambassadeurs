{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ski Parrainage</title>
    </head>
    <body style="margin: 0; padding: 0; background-color: #f4f4f5; font-family: Helvetica, Arial, sans-serif">
        <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="background-color: #f4f4f5; padding: 24px 0"
        >
            <tr>
                <td align="center">
                    <table
                        role="presentation"
                        width="100%"
                        cellpadding="0"
                        cellspacing="0"
                        style="max-width: 480px; background-color: #ffffff; border-radius: 8px"
                    >
                        <tr>
                            <td style="padding: 32px; color: #18181b; font-size: 16px; line-height: 1.5">
                                {% block content %}{% endblock %}
                            </td>
                        </tr>
                        <tr>
                            <td style="padding: 0 32px 24px; color: #71717a; font-size: 13px; line-height: 1.5">
                                {% translate "- Ski Parrainage" %}
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
