# .github/workflows/e2e.yml — Playwright end-to-end suite.
#
# Boots an ephemeral, production-shaped instance of the app (config.settings.e2e,
# DEBUG off) against a Postgres service and a Mailpit mail sink, then runs the
# browser suite in e2e/. Mailpit is how the suite reads confirmation / login /
# match links back out of "email" — see e2e/README.md.

name: E2E (Playwright)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "templates/**"
      - "src/**"
      - "e2e/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Run Playwright suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ambassadeurs
          POSTGRES_PASSWORD: ambassadeurs
          POSTGRES_DB: ambassadeurs_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ambassadeurs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailpit:
        # Pin the same tag compose.yaml uses so local and CI match exactly.
        image: axllent/mailpit:v1.30.3
        ports:
          - 1025:1025 # SMTP — Django delivers here
          - 8025:8025 # HTTP API — the suite reads mail here
        options: >-
          --health-cmd "wget -qO- http://localhost:8025/readyz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.e2e
      SECRET_KEY: ci-e2e-secret-key
      DATABASE_URL: postgres://ambassadeurs:ambassadeurs@127.0.0.1:5432/ambassadeurs_e2e
      EMAIL_HOST: 127.0.0.1
      EMAIL_PORT: "1025"
      BASE_URL: http://127.0.0.1:8000
      MAILPIT_URL: http://127.0.0.1:8025

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build Tailwind CSS
        run: |
          npm install
          npm run css:build

      - name: Apply migrations
        run: uv run python manage.py migrate --noinput

      - name: Collect static files
        run: uv run python manage.py collectstatic --noinput

      - name: Install Playwright + browsers
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run the suite
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
