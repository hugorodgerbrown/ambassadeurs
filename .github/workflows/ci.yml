# .github/workflows/ci.yml — Run formatting, linting, type checks, Django
# checks, and tests via tox on push to main and on pull requests.

name: Python / Django

on:
  push:
    branches:
      - main
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "tox.ini"
      - ".github/workflows/ci.yml"

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "tox.ini"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only reads the checked-out code.
permissions:
  contents: read

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toxenv: [fmt, lint, mypy]
    env:
      TOXENV: ${{ matrix.toxenv }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox

  checks:
    name: Run Django checks
    runs-on: ubuntu-latest
    env:
      TOXENV: django-checks

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox

  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      TOXENV: test

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox
