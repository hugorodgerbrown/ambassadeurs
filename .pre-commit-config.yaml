# Pre-commit hooks. ruff lints + formats Python; djangofmt formats templates.
# Run once with `uv run pre-commit install`.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: djangofmt
        name: djangofmt
        entry: djangofmt
        language: system
        types_or: [html]
        files: ^templates/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
