{% comment %}
Reusable primary button / link.
Params: url, label, variant ("primary" default | "secondary" | "ghost").
{% endcomment %}
<a
    href="{{ url }}"
    class="btn {% if variant == 'ghost' %}btn--ghost{% elif variant == 'secondary' %}btn--secondary{% else %}btn--primary{% endif %}"
>
    {{ label }}
</a>
