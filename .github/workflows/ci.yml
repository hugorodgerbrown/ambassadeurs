# .github/workflows/ci.yml — Run formatting, linting, type checks, Django
# checks, and tests via tox on push to main and on pull requests.
#
# The test job runs against a Postgres service (VERB-98): DATABASE_URL in .env
# points config.settings.development at Postgres so backend-specific SQL
# constraints (e.g. FOR UPDATE + DISTINCT) surface in CI, not just in the
# Postgres-backed e2e suite.
#
# Trigger design (VERB-131):
#   * push to main has NO paths filter — every merge runs the full suite so a
#     red main is caught immediately, whatever the merge touched. GitHub does
#     not re-run a PR's checks against main when main advances between the PR's
#     last CI run and the merge, so the push run is the only guard against a
#     merge landing broken code on main.
#   * pull_request keeps a paths filter but includes templates/**: the tox test
#     suite renders templates and asserts their content, so a template-only PR
#     (e.g. #130's how-it-works rework) must run the tests. Omitting templates
#     let #130 merge with stale template-asserting tests that were never run.

name: Python / Django

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "templates/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tox.ini"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: this workflow only reads the checked-out code.
permissions:
  contents: read

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toxenv: [fmt, lint, mypy]
    env:
      TOXENV: ${{ matrix.toxenv }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox

  checks:
    name: Run Django checks
    runs-on: ubuntu-latest
    env:
      TOXENV: django-checks

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox

  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      TOXENV: test
      # Real environment variable (not written into .env): dj_database_url reads
      # os.environ directly, bypassing python-decouple's .env lookup, so
      # config.settings.development only sees the Postgres URL this way. tox
      # forwards it into the test subprocess via `passenv` (see tox.ini).
      DATABASE_URL: postgres://ambassadeurs:ambassadeurs@127.0.0.1:5432/ambassadeurs_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ambassadeurs
          POSTGRES_PASSWORD: ambassadeurs
          POSTGRES_DB: ambassadeurs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ambassadeurs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox
