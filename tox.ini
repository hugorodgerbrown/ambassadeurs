# Local CI. `uv run tox` runs every default env (fmt, lint, mypy,
# django-checks, test). Each env declares its own dependencies so a tox run
# mirrors CI independently of the uv-managed venv. When a runtime dependency is
# added via `uv add`, also add it to the [testenv] deps block below.

[tox]
env_list = fmt, lint, mypy, django-checks, test
requires = tox-uv>=1.16

[testenv]
runner = uv-venv-runner
setenv =
    DJANGO_SETTINGS_MODULE = config.settings.development
deps =
    django>=6.0,<6.1
    django-allauth[socialaccount]>=65.0
    django-htmx>=1.21
    django-countries>=9.0
    python-decouple>=3.8
    whitenoise>=6.7
    dj-database-url>=2.2
    psycopg[binary]>=3.2

[testenv:test]
deps =
    {[testenv]deps}
    pytest>=8.3
    pytest-django>=4.9
    pytest-cov>=6.0
    factory-boy>=3.3
commands = pytest {posargs}

[testenv:mypy]
deps =
    {[testenv]deps}
    mypy>=1.13,<2
    django-stubs[compatible-mypy]>=5.1
commands = mypy core accounts matching public debug

[testenv:django-checks]
deps = {[testenv]deps}
commands =
    python manage.py makemigrations --check --dry-run
    python manage.py check

[testenv:fmt]
skip_install = true
deps = ruff>=0.8
commands = ruff format --check .

[testenv:lint]
skip_install = true
deps = ruff>=0.8
commands = ruff check .

[testenv:audit]
skip_install = true
deps = pip-audit>=2.7
allowlist_externals = uv
commands =
    uv export --no-emit-project --format requirements-txt -o {envtmpdir}/requirements.txt
    pip-audit -r {envtmpdir}/requirements.txt
