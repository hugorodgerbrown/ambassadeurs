# Render blueprint: one web service + two cron services + one Postgres database.
# Deploys on merge to main; build.sh migrates on each deploy. Plan names and
# region are placeholders to confirm against the Render account at deploy time.

services:
  - type: web
    name: ambassadeurs
    runtime: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: uv run gunicorn config.wsgi:application
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.14"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      # Admin subdomain (ADR 0022). Set to the admin host (e.g.
      # admin.skiparrainage.ch) to confine the Django admin to that host; it must
      # also be added to ALLOWED_HOSTS and (https://) CSRF_TRUSTED_ORIGINS, and
      # registered as a custom domain on this service. Leave unset to keep the
      # admin at /admin/ on the main domain.
      - key: ADMIN_HOST
        sync: false
      # PostHog server-side error monitoring (VERB-65). Set the project API key
      # in the Render dashboard; the crons read it from this web service.
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://eu.i.posthog.com
      # Stripe (VERB-85/86, ADR 0014). Set both in the Render dashboard — never
      # in source (Invariant 9). STRIPE_SECRET_KEY drives the hosted-Checkout
      # deposit flow and is read by the close-season cron from this web service;
      # STRIPE_WEBHOOK_SECRET signs the checkout.session.completed endpoint
      # (webhooks/stripe/).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ambassadeurs-db
          property: connectionString

  # Cron service: runs the contact-window expiry sweep once per hour.
  # Expires PROPOSED matches whose expires_at has passed and re-queues both
  # registrations (keeping-faith side to front, non-responder to back).
  - type: cron
    name: ambassadeurs-expire-matches
    runtime: python
    plan: starter
    schedule: "0 * * * *"
    buildCommand: ./build.sh
    startCommand: uv run python manage.py expire_matches
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.14"
      - key: SECRET_KEY
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: ALLOWED_HOSTS
      - key: CSRF_TRUSTED_ORIGINS
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: CSRF_TRUSTED_ORIGINS
      # Env parity with the web service (ADR 0022); crons never route HTTP.
      - key: ADMIN_HOST
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: ADMIN_HOST
      - key: POSTHOG_API_KEY
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: POSTHOG_API_KEY
      - key: POSTHOG_HOST
        value: https://eu.i.posthog.com
      - key: DATABASE_URL
        fromDatabase:
          name: ambassadeurs-db
          property: connectionString

  # Cron service: drains the waiting pool by proposing eligible matches once
  # per hour (matching.services.run_matching, --commit to apply). Clears the
  # queue that builds up while matching is gated before the open date (see
  # propose_match / VERB-83), then keeps draining any late entrants.
  - type: cron
    name: ambassadeurs-run-matching
    runtime: python
    plan: starter
    schedule: "0 * * * *"
    buildCommand: ./build.sh
    startCommand: uv run python manage.py run_matching --commit
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.14"
      - key: SECRET_KEY
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: ALLOWED_HOSTS
      - key: CSRF_TRUSTED_ORIGINS
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: CSRF_TRUSTED_ORIGINS
      # Env parity with the web service (ADR 0022); crons never route HTTP.
      - key: ADMIN_HOST
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: ADMIN_HOST
      - key: POSTHOG_API_KEY
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: POSTHOG_API_KEY
      - key: POSTHOG_HOST
        value: https://eu.i.posthog.com
      - key: DATABASE_URL
        fromDatabase:
          name: ambassadeurs-db
          property: connectionString

  # Cron service: the season-end deposit refund sweep. Runs once daily and
  # refunds every still-HELD deposit whose registration never reached an
  # ACCEPTED match and is not suspended (matching.services.close_season,
  # --commit to apply). A no-op outside the season-end window (nothing left
  # HELD once the season has wound down); safe to leave scheduled daily.
  - type: cron
    name: ambassadeurs-close-season
    runtime: python
    plan: starter
    schedule: "0 3 * * *"
    buildCommand: ./build.sh
    startCommand: uv run python manage.py close_season --commit
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.14"
      - key: SECRET_KEY
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: ALLOWED_HOSTS
      - key: CSRF_TRUSTED_ORIGINS
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: CSRF_TRUSTED_ORIGINS
      # Env parity with the web service (ADR 0022); crons never route HTTP.
      - key: ADMIN_HOST
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: ADMIN_HOST
      - key: POSTHOG_API_KEY
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: POSTHOG_API_KEY
      - key: POSTHOG_HOST
        value: https://eu.i.posthog.com
      # Stripe secret key — read from the web service so refunds can authenticate.
      - key: STRIPE_SECRET_KEY
        fromService:
          name: ambassadeurs
          type: web
          envVarKey: STRIPE_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: ambassadeurs-db
          property: connectionString

databases:
  - name: ambassadeurs-db
    plan: basic-256mb
