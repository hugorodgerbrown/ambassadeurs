# Render blueprint: single web service + one Postgres database.
# Deploys on merge to main; build.sh migrates on each deploy. Plan names and
# region are placeholders to confirm against the Render account at deploy time.

services:
  - type: web
    name: ambassadeurs
    runtime: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: uv run gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.14"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ambassadeurs-db
          property: connectionString

databases:
  - name: ambassadeurs-db
    plan: basic-256mb
