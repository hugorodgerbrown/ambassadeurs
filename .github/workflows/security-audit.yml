# .github/workflows/security-audit.yml — Audit locked Python dependencies
# for known CVEs on every push/PR and on a weekly cron, so newly-published
# advisories surface even when the lockfile has not changed.

name: Security audit

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python (3.14)
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Export locked dependencies
        run: >-
          uv export
          --frozen
          --no-dev
          --no-emit-project
          --no-hashes
          --format requirements-txt
          --output-file /tmp/requirements-audit.txt

      - name: Audit dependencies for known CVEs
        run: pip-audit -r /tmp/requirements-audit.txt
