# .github/workflows/lighthouse.yml — Run a Lighthouse audit (performance,
# accessibility, best-practices, SEO) against the key public pages, served by
# the Django dev server. Thresholds live in lighthouserc.json.

name: Lighthouse

on:
  push:
    branches:
      - main
    paths:
      - "**/*.py"
      - "templates/**"
      - "src/css/**"
      - "static/**"
      - "lighthouserc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lighthouse.yml"

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.py"
      - "templates/**"
      - "src/css/**"
      - "static/**"
      - "lighthouserc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lighthouse.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Python (3.14)
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node (24)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Python dependencies
        run: uv sync

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run css:build

      - name: Apply migrations
        run: uv run python manage.py migrate

      - name: Run Lighthouse CI
        run: npx lhci autorun
