{% extends "base.html" %}
{% load i18n %}

{% block page_title %}{% translate "Sign out" %}{% endblock %}

{% block content %}
    <section>
        <h1 class="mb-4 text-ink">{% translate "Sign out" %}</h1>
        <p class="mb-6 text-body">
            {% translate "Are you sure you want to sign out?" %}
        </p>
        <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn--primary">
                {% translate "Sign out" %}
            </button>
        </form>
    </section>
{% endblock %}
