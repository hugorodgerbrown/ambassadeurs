{% load i18n %}
<header class="border-b border-border bg-card">
    <nav class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
        <a href="{% url 'public:home' %}" class="font-semibold text-text-1">
            {% translate "4 Vallées Ambassadors" %}
        </a>
        <form action="{% url 'set_language' %}" method="post" class="text-sm">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.path }}">
            <select
                name="language"
                onchange="this.form.submit()"
                class="rounded-sm border border-border bg-card px-2 py-1"
                aria-label="{% translate 'Change language' %}"
            >
                {% get_current_language as current %}
                {% get_available_languages as languages %}
                {% for code, name in languages %}
                    <option value="{{ code }}" {% if code == current %}selected{% endif %}>
                        {{ name }}
                    </option>
                {% endfor %}
            </select>
        </form>
    </nav>
</header>
